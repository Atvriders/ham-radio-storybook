name: build-docker-image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Build the book (HTML/TXT/PDF)
        run: |
          pip install -r requirements.txt
          python3 -m playwright install --with-deps chromium || true   # optional; PDF is best-effort
          python3 tools/build_book.py --html --txt --pdf --out build/

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/atvriders/ham-radio-storybook:latest
          labels: org.opencontainers.image.source=https://github.com/Atvriders/ham-radio-storybook
