<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t3">
<title id="t3">A radio signal leaves a tower, bounces off the ionosphere, and skips across the world to Australia — like a stone skipping on a pond</title>
