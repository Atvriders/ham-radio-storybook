</g>
<polyline points="90,250 205,122 330,318 470,122 700,286" fill="none" stroke="#e8734a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M700 286 l-16 -2 l8 14 Z" fill="#e8734a"/>
<text x="322" y="345" text-anchor="middle" fill="#d8cfae" font-size="14" font-style="italic" font-family="Georgia, serif">plip!</text>
