  <text x="180" y="119" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#fdfcf7">CQ, CQ!</text>
</g>
<g>
  <rect x="560" y="255" width="140" height="46" rx="14" fill="#e8a54b"/>
  <path d="M620 255 l10 -14 l10 14 Z" fill="#e8a54b"/>
  <text x="630" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1a3a6b">G'day, mate!</text>
</g>
<g>
  <circle cx="120" cy="290" r="22" fill="#d8cfae"/>
  <circle cx="128" cy="284" r="18" fill="#fdfcf7"/>
  <text x="120" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#666">bedtime for Mia</text>
</g>
<g>
  <circle cx="680" cy="70" r="20" fill="#ffd25e"/>
  <g stroke="#e8a54b" stroke-width="3.5" stroke-linecap="round">
    <line x1="680" y1="38" x2="680" y2="46"/><line x1="680" y1="94" x2="680" y2="102"/>
    <line x1="648" y1="70" x2="656" y2="70"/><line x1="704" y1="70" x2="712" y2="70"/>
    <line x1="658" y1="48" x2="664" y2="54"/><line x1="696" y1="86" x2="702" y2="92"/>
    <line x1="702" y1="48" x2="696" y2="54"/><line x1="664" y1="86" x2="658" y2="92"/>
  </g>
  <text x="680" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#666">tomorrow morning in Australia</text>
