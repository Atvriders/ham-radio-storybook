<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t5">
<title id="t5">A globe with a dotted radio path skipping from Mia's house in America to Bruce in Australia, where it is already tomorrow morning</title>
<rect x="0" y="0" width="800" height="360" fill="#fdfcf7"/>
<g>
  <circle cx="400" cy="195" r="120" fill="#3f6db5"/>
  <ellipse cx="400" cy="195" rx="55" ry="120" fill="none" stroke="#2a4f8f" stroke-width="2"/>
  <ellipse cx="400" cy="195" rx="95" ry="120" fill="none" stroke="#2a4f8f" stroke-width="2"/>
  <line x1="280" y1="195" x2="520" y2="195" stroke="#2a4f8f" stroke-width="2"/>
  <ellipse cx="355" cy="150" rx="30" ry="22" fill="#58b368"/>
  <ellipse cx="370" cy="235" rx="18" ry="26" fill="#58b368"/>
  <ellipse cx="455" cy="140" rx="28" ry="18" fill="#58b368"/>
  <ellipse cx="470" cy="255" rx="20" ry="14" fill="#58b368"/>
</g>
<path d="M352 148 Q420 30 474 250" fill="none" stroke="#e8734a" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
<path d="M474 250 l-13 -8 l3 13 Z" fill="#e8734a"/>
<g>
  <circle cx="352" cy="148" r="7" fill="#d95555" stroke="#fdfcf7" stroke-width="2"/>
  <circle cx="470" cy="252" r="7" fill="#e8a54b" stroke="#fdfcf7" stroke-width="2"/>
</g>
<g>
